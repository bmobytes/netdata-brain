[agent]
  interval = "60s"
  flush_interval = "10s"
  hostname = "bmo-deploy"

[[inputs.prometheus]]
  urls = ["http://plex-exporter:9000/metrics"]
  metric_version = 2

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "plex"
